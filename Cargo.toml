[workspace]
resolver = "2"
members = ["crates/*"]

[workspace.package]
edition = "2024"
license = "GPL-3.0"
version = "0.1.0"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
anyhow = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json"] }
clap = { version = "4", features = ["derive"] }
glam = "0.29"

# Internal
kiran-core = { path = "crates/kiran-core" }
kiran-scene = { path = "crates/kiran-scene" }
kiran-input = { path = "crates/kiran-input" }
kiran-render = { path = "crates/kiran-render" }
kiran-ai = { path = "crates/kiran-ai" }
kiran-physics = { path = "crates/kiran-physics" }

[package]
name = "kiran"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Kiran — AI-native game engine"

[dependencies]
kiran-core = { workspace = true }
kiran-scene = { workspace = true }
kiran-input = { workspace = true }
kiran-render = { workspace = true }
kiran-physics = { workspace = true }
clap = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
